<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>HRMS Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-styles">
    /* Custom styles for specific elements */
    body {
      background-color: #f8f9fa; /* Light gray background */
      font-family: 'Inter', sans-serif; /* Clean sans-serif font */
    }
    .brand-color {
      color: #633c97; /* Purple brand color */
    }
    .brand-bg {
      background-color: #633c97; /* Purple brand background */
    }
    .brand-bg:hover {
      background-color: #512b80; /* Darker purple on hover */
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-surface p-4">
<!-- BEGIN: LoginContainer -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-2xl shadow-sm border border-outline-variant p-8 sm:p-10" data-purpose="login-card">
<!-- BEGIN: BrandHeader -->
<header class="flex flex-col items-center justify-center mb-8" data-purpose="brand-header">
<div class="flex items-center space-x-3">
<!-- Brand Icon -->
<div class="brand-bg w-14 h-14 rounded-xl flex items-center justify-center text-white shadow-sm">
<svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
<!-- Brand Name -->
<h1 class="text-3xl font-bold brand-color tracking-tight">HRMS</h1>
</div>
</header>
<!-- END: BrandHeader -->
<!-- BEGIN: LoginForm -->
<form action="#" data-purpose="login-form" method="POST">
<div class="space-y-6">
<!-- Login ID / Email Field -->
<div class="space-y-1">
<label class="block text-sm font-medium text-gray-700" for="email">Login ID or Email</label>
<div class="relative rounded-md shadow-sm">
<input class="block w-full rounded-lg border-outline-variant py-3 px-4 text-on-surface focus:border-primary focus:ring-primary sm:text-sm placeholder-gray-400 transition-colors duration-200" id="email" name="email" placeholder="Enter your login ID or email" required="" type="text">
</div>
</div>
<!-- Password Field -->
<div class="space-y-1">
<label class="block text-sm font-medium text-gray-700" for="password">Password</label>
<div class="relative rounded-md shadow-sm">
<input class="block w-full rounded-lg border-outline-variant py-3 pl-4 pr-10 text-on-surface focus:border-primary focus:ring-primary sm:text-sm placeholder-gray-400 transition-colors duration-200" id="password" name="password" placeholder="Enter your password" required="" type="password">
<!-- Password Visibility Toggle -->
<button aria-label="Toggle password visibility" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600 focus:outline-none" type="button">
<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
</div>
</div>
<!-- Submit Button -->
<div class="pt-2">
<button class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-on-primary brand-bg hover:shadow-md focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-200" type="submit">
            Sign In
          </button>
</div>
</div>
</form>
<!-- END: LoginForm -->
<!-- BEGIN: FooterLinks -->
<div class="mt-8 text-center text-sm text-gray-600" data-purpose="footer-links">
      Don't have an account? 
      <a class="font-semibold brand-color hover:underline transition-all" href="#">Sign Up</a>
</div>
<!-- END: FooterLinks -->
</main>
<!-- END: LoginContainer -->


</body></html>
