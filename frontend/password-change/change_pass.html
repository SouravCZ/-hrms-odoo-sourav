<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HRMS - Set New Password</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {

                extend: {
                    "colors": {

                        "surface-container": "#eeeef0",

                        "surface-tint": "#6c45c0",
                        "on-secondary-container": "#6b616e",
                        "secondary": "#655b68",

                        "on-primary-fixed": "#24005b",
                        "on-tertiary-fixed": "#2e1500",
                        "secondary-fixed-dim": "#cfc2d2",
                        "inverse-on-surface": "#f0f0f2",
                        "primary-container": "#5e35b1",
                        "primary-fixed": "#eaddff",
                        "tertiary-container": "#7b4200",
                        "inverse-primary": "#d1bcff",
                        "error-container": "#ffdad6",
                        "on-surface": "#1a1c1d",
                        "on-primary-fixed-variant": "#5429a7",
                        "on-primary": "#ffffff",
                        "inverse-surface": "#2f3132",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#ffb371",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#d9dadc",
                        "surface": "#f9f9fb",
                        "surface-container-low": "#f3f3f5",
                        "on-tertiary-fixed-variant": "#6d3a00",
                        "primary-fixed-dim": "#d1bcff",
                        "surface-variant": "#e2e2e4",
                        "surface-container-high": "#e8e8ea",
                        "tertiary": "#5a2f00",
                        "on-error-container": "#93000a",
                        "background": "#f9f9fb",
                        "outline": "#7b7484",
                        "primary": "#461599",
                        "error": "#ba1a1a",
                        "on-secondary-fixed-variant": "#4d4450",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#ffdcc2",
                        "on-background": "#1a1c1d",
                        "on-surface-variant": "#494453",
                        "secondary-container": "#ecdeee",
                        "tertiary-fixed-dim": "#ffb77a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "margin": "32px",
                        "lg": "32px",
                        "base": "8px",
                        "xs": "4px",
                        "xl": "48px",
                        "sm": "12px",
                        "md": "24px"
                    },
                    "fontFamily": {
                        "body-sm": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-sm": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "body-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],

                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500" }],

                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }]
                    }
                }
            }
        }

<style>
        body {
            background-color: #F5F5F7;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
<!-- Decorative background elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none -z-10">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary opacity-5 rounded-full blur-3xl"></div>
<div class="absolute top-1/2 -right-48 w-full max-w-lg h-96 bg-surface-tint opacity-5 rounded-full blur-3xl transform -translate-y-1/2"></div>
</div>
<!-- Centered Form Card -->
<div class="w-full max-w-md bg-on-primary rounded-[16px] shadow-[0px_4px_12px_rgba(0,0,0,0.05)] p-md border border-outline-variant/30">
<!-- Header -->
<div class="text-center mb-8">
<h1 class="font-headline-lg text-headline-lg text-primary mb-2">HRMS</h1>
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-2">Set Your Password</h2>
<p class="font-body-md text-body-md text-secondary">
                This is your first login. Please set a new password to continue.
            </p>
</div>
<!-- Form -->
<form class="space-y-6">
<!-- New Password Field -->
<div class="relative">
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="new-password">New Password</label>
<div class="relative">
<input class="w-full px-4 py-3 rounded-lg border border-outline-variant bg-surface focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none font-body-md text-body-md text-on-surface pr-12" id="new-password" name="new-password" placeholder="Enter new password" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-secondary hover:text-primary transition-colors focus:outline-none" onclick="togglePassword('new-password', 'new-password-icon')" type="button">
<span class="material-symbols-outlined" id="new-password-icon" style="font-variation-settings: 'FILL' 0;">visibility_off</span>
</button>
</div>
<!-- Password Strength Indicator (Visual Polish) -->
<div class="mt-2 flex gap-1 h-1 w-full rounded-full overflow-hidden bg-surface-container">
<div class="h-full bg-primary/30 w-1/3"></div>
<div class="h-full bg-transparent w-1/3"></div>
<div class="h-full bg-transparent w-1/3"></div>
</div>
<p class="mt-1 font-body-sm text-body-sm text-secondary">Password strength: Weak</p>
</div>
<!-- Confirm Password Field -->
<div class="relative">
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="confirm-password">Confirm Password</label>
<div class="relative">
<input class="w-full px-4 py-3 rounded-lg border border-outline-variant bg-surface focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none font-body-md text-body-md text-on-surface pr-12" id="confirm-password" name="confirm-password" placeholder="Confirm new password" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-secondary hover:text-primary transition-colors focus:outline-none" onclick="togglePassword('confirm-password', 'confirm-password-icon')" type="button">
<span class="material-symbols-outlined" id="confirm-password-icon" style="font-variation-settings: 'FILL' 0;">visibility_off</span>
</button>
</div>
</div>
<!-- Password Requirements List -->
<div class="bg-surface-container-low rounded-lg p-4 mt-4">
<p class="font-label-md text-label-md text-on-surface-variant mb-2">Password Requirements:</p>
<ul class="space-y-2">
<li class="flex items-center gap-2 font-body-sm text-body-sm text-secondary">
<span class="material-symbols-outlined text-[16px] text-outline">check_circle</span>
                        At least 8 characters
                    </li>
<li class="flex items-center gap-2 font-body-sm text-body-sm text-secondary">
<span class="material-symbols-outlined text-[16px] text-outline">check_circle</span>
                        One uppercase letter
                    </li>
<li class="flex items-center gap-2 font-body-sm text-body-sm text-secondary">
<span class="material-symbols-outlined text-[16px] text-outline">check_circle</span>
                        One number or symbol
                    </li>
</ul>
</div>
<!-- Submit Button -->
<button class="w-full py-3 px-4 bg-primary hover:bg-primary/90 text-on-primary font-label-md text-label-md rounded-lg shadow-sm transition-all flex items-center justify-center gap-2" type="submit">
                Set New Password
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
</div>
<script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === "password") {
                input.type = "text";
                icon.textContent = "visibility";
            } else {
                input.type = "password";
                icon.textContent = "visibility_off";
            }
        }
    </script>
</body></html>
